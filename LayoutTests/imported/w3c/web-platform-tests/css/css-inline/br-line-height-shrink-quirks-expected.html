<!-- Quirks mode (no doctype) -->
<html>
<head>
  <title>CSS Test Reference: BR with small explicit line-height shrinks the line in quirks mode</title>
  <link rel="stylesheet" type="text/css" href="/fonts/ahem.css">
  <style>
  body {
      margin: 0;
  }
  div {
      font: 20px/1 Ahem;
  }
  </style>
</head>
<body>
  <div>A</div>
  <div style="height: 5px"></div>
  <div>B</div>
</body>
</html>
