<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>CSS Test: BR with small explicit line-height does not shrink below the strut</title>
  <link rel="help" href="https://drafts.csswg.org/css-inline-3/#line-height-property">
  <link rel="match" href="br-line-height-shrink-ref.html">
  <link rel="stylesheet" type="text/css" href="/fonts/ahem.css">
  <meta name="assert" content="A BR with line-height smaller than the font does not shrink the line below the root inline box strut in standards mode.">
  <style>
  body {
      margin: 0;
  }
  div {
      font: 20px/1 Ahem;
  }
  br {
      line-height: 5px;
  }
  </style>
</head>
<body>
  <p>Test passes if X appears at approximately 20px from the top.</p>
  <div><br>X</div>
</body>
</html>
