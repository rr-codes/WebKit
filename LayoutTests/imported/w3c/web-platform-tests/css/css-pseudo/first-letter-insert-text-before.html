<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>CSS Test: ::first-letter rebuild after text insertion</title>
  <link rel="match" href="first-letter-insert-text-before-ref.html">
  <link rel="help" href="https://drafts.csswg.org/css-pseudo-4/#first-letter-pseudo">
  <meta name="assert" content="Inserting a text node before an existing ::first-letter element should rebuild the first letter from the new first text.">
  <style>
  div::first-letter {
      color: green;
  }
  div {
      font-size: 50px;
  }
  </style>
</head>
<body>
  <p>Test passes if "ABC" appears below with "A" in green.</p>
  <div id="test">BC</div>
  <script>
  document.body.offsetHeight;
  test.insertBefore(document.createTextNode("A"), test.firstChild);
  </script>
</body>
</html>
