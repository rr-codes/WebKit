<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>CSS Test: ::first-letter with punctuation in dynamically added ::before content</title>
  <link rel="author" title="Apple" href="https://www.apple.com">
  <link rel="help" href="https://drafts.csswg.org/css-pseudo-4/#first-letter-styling">
  <link rel="match" href="first-letter-before-dynamic-punctuation-ref.html">
  <meta name="assert" content="When ::before content starts with punctuation, the first letter should include the punctuation and the first alphanumeric character.">
  <style>
  .fl::first-letter {
      color: green;
  }
  .bef::before {
      content: '"Hi';
  }
  </style>
</head>
<body>
  <p>Test passes if you see <strong>"HiWorld</strong> with <strong>"H</strong> in green.</p>
  <div class="fl"><span id="s1">World</span></div>
  <script>
  document.body.offsetTop;
  s1.className = "bef";
  </script>
</body>
</html>
