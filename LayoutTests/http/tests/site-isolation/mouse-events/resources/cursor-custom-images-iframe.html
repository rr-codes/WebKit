<!DOCTYPE html>
<html>
<head>
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
        }

        body {
            cursor: url('cursor7x7.png') 0 0, auto;
        }

        #element {
            position: absolute;
            left: 20px;
            top: 80px;
            width: 100px;
            height: 50px;
            cursor: url('cursor9x9.png') 0 0, auto;
        }

        #scroller {
            position: absolute;
            left: 0;
            top: 180px;
            width: 400px;
            height: 120px;
            overflow-x: auto;
            overflow-y: hidden;
        }

        #scroller-content {
            width: 1200px;
            height: 100px;
            position: relative;
        }

        #overflow-element {
            position: absolute;
            left: 1000px;
            top: 10px;
            width: 80px;
            height: 80px;
            cursor: url('cursor11x11.png') 0 0, auto;
        }

        #edge-element {
            position: absolute;
            left: 300px;
            top: 200px;
            width: 100px;
            height: 100px;
            cursor: url('cursor11x11.png') 0 0, auto;
        }

        #nested-overlapping {
            position: absolute;
            left: 50px;
            top: 310px;
            width: 100px;
            height: 25px;
            z-index: 10;
            cursor: url('cursor8x8.png') 0 0, auto;
        }

        #nested-frame {
            position: absolute;
            left: 50px;
            top: 310px;
            width: 350px;
            height: 230px;
            border: none;
        }
    </style>
</head>
<body>
    <div id="element"></div>
    <div id="scroller">
        <div id="scroller-content">
            <div id="overflow-element"></div>
        </div>
    </div>
    <div id="edge-element"></div>
    <div id="nested-overlapping"></div>
    <iframe id="nested-frame" src="cursor-custom-images-nested-iframe.html"></iframe>
    <script>
        function preloadImages(urls) {
            return Promise.all(urls.map(url => new Promise(resolve => {
                const img = new Image();
                img.onload = img.onerror = resolve;
                img.src = url;
            })));
        }

        var nestedReady = false;
        var imagesReady = false;

        function maybeSendReady() {
            if (nestedReady && imagesReady)
                window.parent.postMessage('ready', '*');
        }

        window.addEventListener('message', (event) => {
            if (event.data === 'scroll') {
                const scroller = document.getElementById('scroller');
                scroller.scrollLeft = scroller.scrollWidth - scroller.clientWidth;
                requestAnimationFrame(() => {
                    window.parent.postMessage('scrolled', '*');
                });
            }

            if (event.data === 'nested-ready') {
                nestedReady = true;
                maybeSendReady();
            }

            if (event.data === 'scroll-nested') {
                document.getElementById('nested-frame').contentWindow.postMessage('scroll', '*');
            }

            if (event.data === 'nested-scrolled') {
                window.parent.postMessage('nested-scrolled', '*');
            }
        });

        preloadImages(['cursor7x7.png', 'cursor8x8.png', 'cursor9x9.png', 'cursor11x11.png']).then(() => {
            imagesReady = true;
            maybeSendReady();
        });
    </script>
</body>
</html>
